services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: agro_postgres
    environment:
      POSTGRES_DB: agro_geo
      POSTGRES_USER: agro
      POSTGRES_PASSWORD: agro
    ports:
      - "5432:5432"
    volumes:
      - agro_pg:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agro_geo_api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: agro_geo
      POSTGRES_USER: agro
      POSTGRES_PASSWORD: agro
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  agro_pg:

